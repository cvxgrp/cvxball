INHERIT: docs/mkdocs-base.yml

site_name: cvxball
site_description: Fast computation of the smallest enclosing sphere.
site_author: Thomas Schmelzer
site_url: https://cvxgrp.github.io/cvxball/
repo_url: https://github.com/cvxgrp/cvxball
repo_name: cvxgrp/cvxball
copyright: Copyright &copy; 2024–2026 Thomas Schmelzer

docs_dir: docs

nav:
  - Home: index.md
  - API Reference: api.md
  - Development:
    - Tests: development/TESTS.md
    - Marimo: development/MARIMO.md
  - Reports:
    - Test Report: reports/html-report/report.html
    - Coverage Report: reports/html-coverage/index.html


plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

